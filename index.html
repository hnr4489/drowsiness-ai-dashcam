<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure OTP Login - AI Dashcam</title>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        // 1. Initialize with your EmailJS Public Key
        (function() {
            emailjs.init("fkrRDieAIt_XMthMR"); 
        })();
    </script>
    <style>
        body { 
            background-color: #121212; color: white; font-family: sans-serif; 
            display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; 
        }
        .login-box { 
            background-color: #1e2126; padding: 40px; border-radius: 10px; 
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); text-align: center; width: 350px; 
        }
        input { 
            width: 100%; padding: 12px; margin: 10px 0; border: none; border-radius: 5px; 
            box-sizing: border-box; background-color: #2a2d35; color: white; 
        }
        button { 
            width: 100%; padding: 12px; background-color: lime; color: black; 
            border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 15px; font-size: 1.1rem; 
        }
        button:hover { background-color: #32cd32; }
        #error-msg, #success-msg { 
            display: none; margin-top: 15px; font-size: 0.9rem; text-align: left; padding: 10px; border-radius: 5px; 
        }
        #error-msg { color: #ff4c4c; background: rgba(255, 76, 76, 0.1); }
        #success-msg { color: lime; background: rgba(0, 255, 0, 0.1); }
        #otp-section { display: none; } /* Hidden by default */
    </style>
</head>
<body>

    <div class="login-box">
        <h2>🚗 AI Dashcam Login</h2>
        
        <div id="email-section">
            <input type="email" id="email" placeholder="Enter your Email" required>
            <button onclick="sendOTP()" id="send-btn">Send OTP</button>
        </div>

        <div id="otp-section">
            <p style="color: #aaa; font-size: 0.9rem;">An OTP has been sent to your email.</p>
            <input type="text" id="otp-input" placeholder="Enter 6-digit OTP" maxlength="6">
            <button onclick="verifyOTP()">Verify & Login</button>
        </div>

        <p id="error-msg"></p>
        <p id="success-msg"></p>
    </div>

    <script>
        let generatedOTP = ""; // Store the OTP to check it later

        function sendOTP() {
            const email = document.getElementById("email").value;
            const errorEl = document.getElementById("error-msg");
            const btn = document.getElementById("send-btn");

            // Basic email validation
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError("❌ Please enter a valid email address.");
                return;
            }

            // Generate a random 6-digit number
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();

            // Prepare data for EmailJS (Must match the {{variables}} in your template)
            const templateParams = {
                to_email: email,
                otp: generatedOTP
            };

            btn.innerText = "Sending...";
            btn.disabled = true;

            // 2. Send the email via EmailJS using your specific Service and Template IDs
            emailjs.send('service_yy57cot', 'template_9ge96ce', templateParams)
                .then(function(response) {
                    console.log('SUCCESS!', response.status, response.text);
                    document.getElementById("email-section").style.display = "none";
                    document.getElementById("otp-section").style.display = "block";
                    showSuccess("✅ OTP sent successfully! Check your inbox.");
                }, function(error) {
                    console.log('FAILED...', error);
                    showError("❌ Failed to send OTP. Check console.");
                    btn.innerText = "Send OTP";
                    btn.disabled = false;
                });
        }

        function verifyOTP() {
            const userOTP = document.getElementById("otp-input").value;
            
            if (userOTP === generatedOTP) {
                // Success! Redirect to the AI Camera
                window.location.href = "app.html";
            } else {
                showError("❌ Incorrect OTP. Please try again.");
            }
        }

        function showError(msg) {
            document.getElementById("success-msg").style.display = "none";
            const errorEl = document.getElementById("error-msg");
            errorEl.innerHTML = msg;
            errorEl.style.display = "block";
        }

        function showSuccess(msg) {
            document.getElementById("error-msg").style.display = "none";
            const successEl = document.getElementById("success-msg");
            successEl.innerHTML = msg;
            successEl.style.display = "block";
        }
    </script>

</body>
</html>
