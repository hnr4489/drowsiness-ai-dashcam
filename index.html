<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 AI Dashcam v3.0 - EAR Tracking</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #webcam { 
            border-radius: 20px; border: 5px solid #333; 
            width: 100%; max-width: 640px; transform: scaleX(-1); display: none; 
        }
        .alert-video { border-color: red !important; box-shadow: 0 0 50px red; }
        #status { font-size: 2.5rem; margin-top: 20px; color: lime; display: none; font-weight: bold;}
        .alert-text { color: red !important; text-shadow: 0 0 15px red; }
        #start-btn {
            padding: 15px 30px; font-size: 1.2rem; background-color: lime; color: black;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px;
        }
        .controls { background: #1e2126; padding: 15px; border-radius: 10px; display: inline-block; margin-top: 20px; display: none;}
        input[type=range] { width: 200px; cursor: pointer; }
    </style>
</head>
<body>
    
    <h1>🚗 AI Drowsiness Dashcam</h1>
    <button id="start-btn" onclick="startSystem()">Start Camera & AI</button>
    
    <div id="loading" style="display:none; color: yellow; margin: 20px; font-size: 1.2rem;">⏳ Loading AI Model... Please wait...</div>
    
    <div>
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="status">✅ Driver Focused</div>
    
    <div class="controls" id="controls">
        <h3 id="score" style="margin: 0 0 10px 0; color: #61dafb;">Current EAR: 0.00</h3>
        <label for="threshold" style="font-weight: bold;">Trigger Alert if EAR drops below: <span id="thresh-val" style="color: yellow;">0.25</span></label><br>
        <input type="range" id="threshold" min="0.10" max="0.40" step="0.01" value="0.25" oninput="document.getElementById('thresh-val').innerText=this.value">
        <p style="font-size: 0.8rem; color: #aaa;">(Lower number = harder to trigger alarm)</p>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const scoreText = document.getElementById('score');
        const loadingText = document.getElementById('loading');
        const startBtn = document.getElementById('start-btn');
        const controls = document.getElementById('controls');
        
        const alarm = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        alarm.loop = true;

        // Euclidean Distance Helper
        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        // Calculate Eye Aspect Ratio
        function getEAR(eye) {
            const v1 = getDistance(eye[1], eye[5]);
            const v2 = getDistance(eye[2], eye[4]);
            const h = getDistance(eye[0], eye[3]);
            return (v1 + v2) / (2.0 * h);
        }

        async function startSystem() {
            startBtn.style.display = 'none';
            loadingText.style.display = 'block';

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false });
                video.srcObject = stream;
                video.style.display = 'inline-block';
                await new Promise((resolve) => video.onloadedmetadata = () => resolve(video));

                const model = faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh;
                const detector = await faceLandmarksDetection.createDetector(model, { runtime: 'tfjs', refineLandmarks: true });

                loadingText.style.display = 'none';
                statusText.style.display = 'block';
                controls.style.display = 'inline-block';

                setInterval(async () => {
                    const faces = await detector.estimateFaces(video);
                    if (faces.length > 0) {
                        const keypoints = faces[0].keypoints;
                        
                        // MediaPipe Left Eye Landmarks (Points: Outer, Top-L, Top-R, Inner, Bot-R, Bot-L)
                        const leftEyePoints = [33, 160, 158, 133, 153, 144].map(id => keypoints[id]);
                        // MediaPipe Right Eye Landmarks
                        const rightEyePoints = [362, 385, 387, 263, 373, 380].map(id => keypoints[id]);

                        const leftEAR = getEAR(leftEyePoints);
                        const rightEAR = getEAR(rightEyePoints);
                        const avgEAR = (leftEAR + rightEAR) / 2.0;

                        // Display current EAR on screen
                        scoreText.innerText = `Current EAR: ${avgEAR.toFixed(2)}`;

                        // Get user-defined threshold from the slider
                        const threshold = parseFloat(document.getElementById('threshold').value);

                        if (avgEAR < threshold) {
                            statusText.innerText = "🚨 WAKE UP! 🚨";
                            statusText.className = "alert-text";
                            video.className = "alert-video";
                            alarm.play().catch(() => {});
                        } else {
                            statusText.innerText = "✅ Driver Focused";
                            statusText.className = "";
                            video.className = "";
                            alarm.pause();
                            alarm.currentTime = 0;
                        }
                    }
                }, 100);

            } catch (err) {
                loadingText.innerText = "❌ Camera Access Denied. Please refresh and allow permissions.";
                loadingText.style.color = "red";
            }
        }
    </script>
</body>
</html>
