<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚗 AI Dashcam v6.0 - Max Volume Siren</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/face-landmarks-detection"></script>
    <style>
        body { background-color: #121212; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #webcam { 
            border-radius: 20px; border: 5px solid #333; 
            width: 100%; max-width: 640px; transform: scaleX(-1); display: none; 
            object-fit: cover; 
        }
        .alert-video { border-color: red !important; box-shadow: 0 0 50px red; }
        #status { font-size: 2.2rem; margin-top: 20px; color: lime; display: none; font-weight: bold;}
        .alert-text { color: red !important; text-shadow: 0 0 15px red; }
        #start-btn {
            padding: 15px 30px; font-size: 1.2rem; background-color: lime; color: black;
            border: none; border-radius: 10px; cursor: pointer; font-weight: bold; margin-bottom: 20px;
        }
        .controls { background: #1e2126; padding: 15px; border-radius: 10px; display: inline-block; margin-top: 20px; display: none; width: 90%; max-width: 400px;}
        input[type=range] { width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    
    <h1>🚗 AI Drowsiness Dashcam</h1>
    <button id="start-btn" onclick="startSystem()">Start Camera & AI</button>
    
    <div id="loading" style="display:none; color: yellow; margin: 20px; font-size: 1.2rem;">⏳ Loading Mobile AI... Please wait...</div>
    
    <div>
        <video id="webcam" autoplay playsinline></video>
    </div>

    <div id="status">✅ Driver Focused</div>
    
    <div class="controls" id="controls">
        <h3 id="score" style="margin: 0 0 10px 0; color: #61dafb;">Current EAR: 0.00</h3>
        <label for="threshold" style="font-weight: bold;">Trigger Alert if EAR drops below: <span id="thresh-val" style="color: yellow;">0.25</span></label><br>
        <input type="range" id="threshold" min="0.10" max="0.40" step="0.01" value="0.25" oninput="document.getElementById('thresh-val').innerText=this.value">
    </div>

    <script>
        const video = document.getElementById('webcam');
        const statusText = document.getElementById('status');
        const scoreText = document.getElementById('score');
        const loadingText = document.getElementById('loading');
        const startBtn = document.getElementById('start-btn');
        const controls = document.getElementById('controls');
        
        // Swapped to an aggressive, piercing emergency siren
        const alarm = new Audio('https://actions.google.com/sounds/v1/emergency/emergency_siren_close_long.ogg');
        alarm.loop = true;
        alarm.volume = 1.0; // 100% of the phone's Media Volume

        function getDistance(p1, p2) {
            return Math.sqrt(Math.pow(p1.x - p2.x, 2) + Math.pow(p1.y - p2.y, 2));
        }

        function getEAR(eye) {
            const v1 = getDistance(eye[1], eye[5]);
            const v2 = getDistance(eye[2], eye[4]);
            const h = getDistance(eye[0], eye[3]);
            return (v1 + v2) / (2.0 * h);
        }

        async function startSystem() {
            startBtn.style.display = 'none';
            loadingText.style.display = 'block';

            alarm.play().then(() => {
                alarm.pause();
                alarm.currentTime = 0;
            }).catch(err => console.log("Audio unlock failed, user needs to tap screen again", err));

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" }, 
                    audio: false 
                });
                
                video.srcObject = stream;
                video.style.display = 'inline-block';
                
                await new Promise((resolve) => {
                    video.onloadedmetadata = () => {
                        video.play();
                        video.width = video.videoWidth;
                        video.height = video.videoHeight;
                        resolve();
                    };
                });

                const model = faceLandmarksDetection.SupportedModels.MediaPipeFaceMesh;
                const detector = await faceLandmarksDetection.createDetector(model, { 
                    runtime: 'tfjs', 
                    refineLandmarks: true 
                });

                loadingText.style.display = 'none';
                statusText.style.display = 'block';
                controls.style.display = 'inline-block';

                setInterval(async () => {
                    const faces = await detector.estimateFaces(video);
                    
                    if (faces.length > 0) {
                        const keypoints = faces[0].keypoints;
                        
                        const leftEyePoints = [33, 160, 158, 133, 153,
